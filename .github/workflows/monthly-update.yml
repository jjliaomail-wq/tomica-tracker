name: Monthly Tomica Data Update

on:
  # Auto-run on the 1st of every month at 10:00 UTC (18:00 Taiwan time)
  schedule:
    - cron: '0 10 1 * *'
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape latest Tomica data
        run: node scrapeAll.js

      - name: Build production site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Commit updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data.js
          git diff --staged --quiet || git commit -m "🤖 Monthly auto-update: $(date +'%Y-%m')"
          git push
